<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Onboarding Input Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f5;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: max(env(safe-area-inset-top, 0px) + 32px, 48px) 20px 40px;
    gap: 16px;
    align-items: center;
  }

  /* ── card ── */
  .card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 24px;
    border: 1px solid #e0e0e8;
    padding: 32px 24px 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }

  .emoji { font-size: 48px; text-align: center; display: block; margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  p  { font-size: 13px; color: #888; text-align: center; line-height: 1.6; margin-bottom: 20px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  /* ── Variant A: default browser input ── */
  .input-a {
    display: block;
    width: 100%;
    font-size: 18px;
    padding: 14px 16px;
    border: 1.5px solid #d0d0da;
    border-radius: 10px;
    background: #f6f6fb;
    color: #111;
    font-family: inherit;
    margin-bottom: 12px;
  }

  /* ── Variant B: -webkit-appearance none ── */
  .input-b {
    display: block;
    width: 100%;
    font-size: 18px;
    padding: 14px 16px;
    border: 1.5px solid #d0d0da;
    border-radius: 10px;
    background: #f6f6fb;
    color: #111;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    margin-bottom: 12px;
  }

  /* ── Variant C: text input that mimics time ── */
  .input-c {
    display: block;
    width: 100%;
    font-size: 18px;
    padding: 14px 16px;
    border: 1.5px solid #d0d0da;
    border-radius: 10px;
    background: #f6f6fb;
    color: #111;
    font-family: inherit;
    text-align: center;
    margin-bottom: 12px;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: #fff;
    background: #5c6bc0;
    border-radius: 4px;
    padding: 2px 6px;
    margin-bottom: 10px;
  }

  /* ── continue button ── */
  .btn {
    display: block;
    width: 100%;
    max-width: 400px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: #5c6bc0;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<!-- Step dots -->
<div style="display:flex; gap:8px; justify-content:center;">
  <div style="width:24px;height:8px;border-radius:4px;background:#5c6bc0;"></div>
  <div style="width:8px;height:8px;border-radius:4px;background:#ddd;"></div>
  <div style="width:8px;height:8px;border-radius:4px;background:#ddd;"></div>
</div>

<div class="card">
  <span class="emoji">⏰</span>
  <h1>When do you wake up?</h1>
  <p>We'll build your schedule around your day.</p>

  <!-- VARIANT A: plain input[type=time] -->
  <div class="section-title">A — plain type="time"</div>
  <label>Wake up</label>
  <input class="input-a" type="time" value="07:00">
  <label>Bedtime</label>
  <input class="input-a" type="time" value="23:00">

  <hr style="border:none;border-top:1px solid #eee;margin:20px 0;">

  <!-- VARIANT B: type=time + -webkit-appearance:none -->
  <div class="section-title">B — type="time" + appearance:none</div>
  <label>Wake up</label>
  <input class="input-b" type="time" value="07:00">
  <label>Bedtime</label>
  <input class="input-b" type="time" value="23:00">

  <hr style="border:none;border-top:1px solid #eee;margin:20px 0;">

  <!-- VARIANT C: type=text with pattern, no native picker -->
  <div class="section-title">C — type="text" (manual input)</div>
  <label>Wake up</label>
  <input class="input-c" type="text" value="07:00" placeholder="07:00" pattern="[0-9]{2}:[0-9]{2}" inputmode="numeric">
  <label>Bedtime</label>
  <input class="input-c" type="text" value="23:00" placeholder="23:00" pattern="[0-9]{2}:[0-9]{2}" inputmode="numeric">
</div>

<button class="btn">Continue</button>

<p style="font-size:11px;color:#aaa;text-align:center;">
  Открой на iPhone в Safari и в PWA (добавить на экран).<br>
  Напиши какой вариант (A/B/C) выглядит правильно.
</p>

</body>
</html>
