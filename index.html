<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon — replace favicon.png with your image in /public -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="UpX" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4C5EE8" />

    <title>UpX — AI Daily Planner</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="UpX — Plan your day with AI" />
    <meta property="og:description" content="Tasks, schedule, focus timer, and AI assistant — all in one free app." />
    <meta property="og:image" content="/screenshot-plan.png" />
    <meta property="og:url" content="https://upx-app.vercel.app/" />
    <meta property="og:site_name" content="UpX" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UpX — Plan your day with AI" />
    <meta name="twitter:description" content="Tasks, schedule, focus timer, and AI assistant — all in one free app." />
    <meta name="twitter:image" content="/screenshot-plan.png" />

    <meta name="description" content="AI-powered daily planner: tasks, schedule, focus timer, and smart assistant. Free, private, no ads." />
  </head>
  <body>
    <!-- Instant splash — renders before any JS loads -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:1;transition:opacity .4s ease">
      <img src="/logo.png" alt="" width="80" height="80" style="animation:splash-pulse 1.2s ease-in-out infinite;will-change:transform,opacity">
      <div style="margin-top:20px;font-family:system-ui,sans-serif;font-size:24px;font-weight:700;color:#fff;letter-spacing:-.02em;opacity:0;animation:splash-fade-in .6s ease .3s forwards">UpX</div>
    </div>
    <style>
      @keyframes splash-pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.08);opacity:1}}
      @keyframes splash-fade-in{to{opacity:1}}
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
